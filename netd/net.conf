# MinOS network configuration
# Read by netd at boot to configure the host bridge and NAT

bridge_name   = osBr0
bridge_ip     = 10.0.0.1
bridge_prefix = 24
out_iface     = eth0

# IP pool for containers: 10.0.0.2 - 10.0.0.254
# Assigned sequentially by the runtime on container spawn
container_base_ip = 10.0.0.2
dns               = 8.8.8.8
