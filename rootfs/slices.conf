# MinOS cgroup v2 slice definitions
# Format: <slice_name>  cpu_weight=<N>  mem_max=<NM|NG|max>
#
# cpu_weight: 1-10000, relative CPU share (kernel default = 100)
# mem_max:    hard memory ceiling e.g. 512M, 2G, or "max" for unlimited
#
# Slices are created by init/mount.c at boot.
# Limits are applied by cgmgr at first service startup.

system     cpu_weight=200  mem_max=512M
containers cpu_weight=800  mem_max=2G
